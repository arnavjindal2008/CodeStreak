<!DOCTYPE html>
<html lang="en">
<head>
    <title>CodeStreak Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="dashboard">
    <button id="logout">Logout</button>
    <h1>CodeStreak</h1>
    <div class="handle-section">
        <input type="text" id="handleInput" placeholder="Enter Codeforces Handle Name">
        <button id="saveHandle">Load Data</button>
    </div>
    <p id="errorhandle"></p>
    <div id="stats"></div>
    <input type="text" id="searchBox" placeholder="Search Problems">
    <div class="controls">
        <select id="sortSelect">
            <option value="">Sort By</option>
            <option value="low">Rating Low → High</option>
            <option value="high">Rating High → Low</option>
        </select>
        <select id="filterSelect">
            <option value="all">All Problems</option>
            <option value="solved">Accepted</option>
            <option value="attempted">Wrong Answer</option>
        </select>
    </div>
    <div id="problemsContainer"></div>
    <div id="pagination"></div>
</div>
<script src="js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <title>CodeStreak Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="dashboard">
    <h1>CodeStreak</h1>
    <div class="handle-section">
        <input type="text" id="handleInput" placeholder="Enter Codeforces Handle Name">
        <button id="saveHandle">Load Data</button>
    </div>
    <div id="stats"></div>
    <input type="text" id="searchBox" placeholder="Search Problems">
    <div id="problemsContainer"></div>
    <div id="pagination"></div>
</div>
<script src="js/dashboard.js"></script>
</body>
</html>
